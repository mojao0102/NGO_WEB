{% extends "staff_base.html" %}
{% load static %}
{% load humanize %}
{% block content %}

<!-- 主內容 -->
<main class="md:ml-[200px] flex-1 p-8 pt-16 md:pt-8">
    <h1 class="text-xl text-gray-700 font-medium mb-8">Create New Student</h1>

    <form class="max-w-2xl space-y-5">
        <h3 class="text-lg text-gray-700 font-medium mb-8">Set up student account</h3>
        <!-- Username -->
        <div>
            <label class="block text-sm text-gray-600 mb-1">Username</label>
            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <!-- Password-->
        <div>
            <label class="block text-sm text-gray-600 mb-1">Password</label>
            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <div class="pt-5">
            <hr class="border-gray-300" />
        </div>
        <h3 class="text-lg text-gray-700 font-medium mb-8">Fill student personal information</h3>

        <!-- Student no -->
        <div>
            <label class="block text-sm text-gray-600 mb-1">Student no</label>
            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <!-- Name (Chi) -->
        <div>
            <label class="block text-sm text-gray-600 mb-1">Name (Chi)</label>
            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <!-- Name (Eng) -->
        <div>
            <label class="block text-sm text-gray-600 mb-1">Name (Eng)</label>
            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <!-- Birthday (已改為日期選擇器) -->
        <div>
            <label class="block text-sm text-gray-600 mb-1">Birthday</label>
            <input type="date" class="w-[200px] border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <!-- School -->
        <div>
            <label class="block text-sm text-gray-600 mb-1">School</label>
            <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <!-- Email -->
        <div>
            <label class="block text-sm text-gray-600 mb-1">Email</label>
            <input type="email" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <!-- Contact person 1 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Contact person 1</label>
                <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Phone</label>
                <input type="tel" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Relationship</label>
                <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
            </div>
        </div>

        <!-- Contact person 2 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Contact person 2</label>
                <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Phone</label>
                <input type="tel" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Relationship</label>
                <input type="text" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
            </div>
        </div>

        <!-- Remark -->
        <div>
            <label class="block text-sm text-gray-600 mb-1">Remark</label>
            <textarea rows="3" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200"></textarea>
        </div>

        <!-- Checkbox -->
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm text-gray-600 mb-2">Active</label>
                <div class="flex items-center">
                    <input type="checkbox" class="w-5 h-5 rounded border-gray-300 cursor-pointer">
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex items-center gap-4 pt-4">
            <button type="button" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">Confirm edit</button>
            <button type="button" class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600">Delete</button>
            <button type="button" class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-gray-800">Back</button>
        </div>
    </form>
</main>

{% endblock %}
