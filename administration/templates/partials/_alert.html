{% if messages %}
  {% for message in messages %}
    <div class="mb-6 mx-auto w-full max-w-2xl transition-all duration-1000 opacity-100" id="django-message-{{ forloop.counter }}">
      
      <div class="flex items-center justify-between p-4 rounded-md border shadow-sm 
        {% if message.tags == 'danger' %}
          bg-red-50 text-red-800 border-red-200
        {% elif message.tags == 'success' %}
          bg-green-50 text-green-800 border-green-200
        {% elif message.tags == 'warning' %}
          bg-amber-50 text-amber-800 border-amber-200
        {% else %}
          bg-blue-50 text-blue-800 border-blue-200
        {% endif %}"
        role="alert">
        
        <div class="flex items-center">
          {% if message.tags == 'danger' %}
            <svg class="w-5 h-5 mr-2 shrink-0 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
          {% elif message.tags == 'success' %}
            <svg class="w-5 h-5 mr-2 shrink-0 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
          {% endif %}

          <span class="text-sm font-medium">
            <strong class="font-bold">
              {% if message.level == DEFAULT_MESSAGE_LEVELS.ERROR %}
                Error: 
              {% else %}
                {{ message.tags | title }}: 
              {% endif %}
            </strong>
            {{ message }}
          </span>
        </div>

        <button type="button" 
                onclick="fadeOutMessage('django-message-{{ forloop.counter }}')"
                class="ml-auto -mx-1.5 -my-1.5 rounded-lg p-1.5 inline-flex h-8 w-8 shrink-0 hover:bg-opacity-20 hover:bg-black focus:outline-none transition-colors
                  {% if message.tags == 'danger' %} text-red-500 {% elif message.tags == 'success' %} text-green-500 {% else %} text-gray-500 {% endif %}">
          <span class="sr-only">Close</span>
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
        </button>
      </div>
    </div>

    <script>
      function fadeOutMessage(elementId) {
        const el = document.getElementById(elementId);
        if (el) {
          el.style.opacity = '0'; // 觸發 Tailwind 透明度過渡動畫
          setTimeout(() => { el.remove(); }, 1000); // 動態播完後徹底從 DOM 移除，避免留白空間
        }
      }

      // 3000ms (3秒) 後自動啟動淡出
      setTimeout(() => {
        fadeOutMessage('django-message-{{ forloop.counter }}');
      }, 3000);
    </script>
  {% endfor %}
{% endif %}
