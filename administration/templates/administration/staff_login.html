{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

<div class="bg-white rounded-xl shadow-md w-full max-w-sm p-8">
    <div class="mb-8 text-center">
        <img src="{% static 'img/logo/jc.png' %}" alt="Logo" class="h-12 object-contain mx-auto mb-4">
        <h1 class="text-xl font-semibold text-gray-700">Staff Login</h1>
    </div>

    {% if messages %}
    <div class="mb-4">
        {% for msg in messages %}
        <p class="text-sm text-red-500 text-center">{{ msg }}</p>
        {% endfor %}
    </div>
    {% endif %}

    <form method="post" class="flex flex-col gap-4">
        {% csrf_token %}
        <div>
            <label class="block text-xs text-gray-500 mb-1">Username</label>
            <input type="text" name="username" value="{{ input_data.username|default:'' }}" required autofocus
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-gray-400">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Password</label>
            <input type="password" name="password" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-gray-400">
        </div>
        <button type="submit"
            class="mt-2 w-full bg-gray-800 hover:bg-gray-700 text-white rounded-lg py-2.5 text-sm font-medium">
            Log in
        </button>
    </form>
</div>

</body>
</html>
