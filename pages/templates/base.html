{% load static %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>頁面</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Google Fonts - Yusei Magic -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style type="text/tailwindcss">
@layer utilities {
    .font-yusei {
    font-family: 'Yusei Magic', sans-serif;
    }
    .text-course-brown {
    color: #592E00;
    }
}
</style>
</head>
<body class="m-0 p-0 font-yusei bg-white font-yusei text-course-brown">

{% include 'partials/_desktop_navbar.html' %}
{% include 'partials/_mobile_navbar.html' %}
{% block content %}{% endblock %} 

<script>
const mainnavbar = document.getElementById('navbar');
const menuBtn = document.getElementById('menuBtn');
const closeBtn = document.getElementById('closeBtn');
const mobileMenu = document.getElementById('mobileMenu');

// 開啟手機選單
menuBtn.addEventListener('click', () => {
  menuBtn.classList.add('hidden');
  mobileMenu.classList.remove('hidden');
  closeBtn.classList.remove('hidden');
  setTimeout(() => {
    mobileMenu.classList.add('opacity-100');
  }, 10);
  document.body.style.overflow = 'hidden';
});

// 關閉手機選單
closeBtn.addEventListener('click', () => {
  mobileMenu.classList.remove('opacity-100');
  setTimeout(() => {
    mobileMenu.classList.add('hidden');
    closeBtn.classList.add('hidden');
    menuBtn.classList.remove('hidden');
  }, 300);
  document.body.style.overflow = '';
});

// 點擊連結自動關閉
const links = mobileMenu.querySelectorAll('a');
links.forEach(link => {
  link.addEventListener('click', () => {
    mobileMenu.classList.remove('opacity-100');
    setTimeout(() => {
      mobileMenu.classList.add('hidden');
      closeBtn.classList.add('hidden');
      menuBtn.classList.remove('hidden');
    }, 300);
    document.body.style.overflow = '';
  });
});
</script>

</body>
</html>
