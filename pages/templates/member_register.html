{% extends "base.html" %} 
{% load static %}
{% load humanize %}
{% block content %}

<!-- 1.2 background -->
<div class="relative min-h-screen bg-cover bg-center flex items-center justify-center pt-[150px] pb-10" 
    style="background-image: url('./img/bg/register.png');">

    <!-- 註冊表單卡片 -->
    <div class="bg-white shadow-lg rounded-lg p-10 w-full max-w-2xl mx-auto">
      <form id="registerForm">
        <!-- Step 1 -->
        <div class="mb-8">
          <h2 class="text-3xl font-bold text-gray-700 mb-6">Step 1：註冊帳號</h2>
          <!-- 帳號 -->
          <div class="mb-6">
            <label for="username" class="block text-gray-700 font-medium mb-2">帳號</label>
            <input type="text" id="username" name="username" placeholder="" required
                   class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
          </div>
          <!-- 密碼 -->
          <div class="mb-6">
            <label for="password" class="block text-gray-700 font-medium mb-2">密碼</label>
            <input type="password" id="password" name="password" placeholder="" required
                   class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
          </div>
        </div>

        <!-- Step 2 -->
        <div class="mb-8">
          <h2 class="text-3xl font-bold text-gray-700 mb-6">Step 2：請填寫資料 (*必填)</h2>
          <!-- 第一排 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
              <label for="studentNameCh" class="block text-gray-700 font-medium mb-2">學生名稱(中文)</label>
              <input type="text" id="studentNameCh" name="studentNameCh" placeholder="" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div>
              <label for="studentNameEn" class="block text-gray-700 font-medium mb-2">學生名稱(英文)</label>
              <input type="text" id="studentNameEn" name="studentNameEn" placeholder="" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
          </div>
          <!-- 第二排 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div>
              <label for="studentDob" class="block text-gray-700 font-medium mb-2">學生出生日期</label>
              <input type="date" id="studentDob" name="studentDob" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div>
              <label for="contactEmail" class="block text-gray-700 font-medium mb-2">Email</label>
              <input type="email" id="contactEmail" name="contactEmail" placeholder="" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
          </div>
          <!-- 就讀學校 -->
          <div class="mb-6">
            <label for="school" class="block text-gray-700 font-medium mb-2">就讀學校</label>
            <input type="text" id="school" name="school" placeholder=""
                   class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
          </div>
          <!-- 聯絡人 1 -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div>
              <label for="contact1Name" class="block text-gray-700 font-medium mb-2">聯絡人名字</label>
              <input type="text" id="contact1Name" name="contact1Name" placeholder="" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div>
              <label for="contact1Phone" class="block text-gray-700 font-medium mb-2">聯絡人電話</label>
              <input type="tel" id="contact1Phone" name="contact1Phone" placeholder="" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div>
              <label for="contact1Relation" class="block text-gray-700 font-medium mb-2">聯絡人關係</label>
              <input type="text" id="contact1Relation" name="contact1Relation" placeholder="母親/父親/其他" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
          </div>
          <!-- 聯絡人 2 -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div>
              <label for="contact2Name" class="block text-gray-700 font-medium mb-2">聯絡人名字</label>
              <input type="text" id="contact2Name" name="contact2Name" placeholder="" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div>
              <label for="contact2Phone" class="block text-gray-700 font-medium mb-2">聯絡人電話</label>
              <input type="tel" id="contact2Phone" name="contact2Phone" placeholder="" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div>
              <label for="contact2Relation" class="block text-gray-700 font-medium mb-2">聯絡人關係</label>
              <input type="text" id="contact2Relation" name="contact2Relation" placeholder="母親/父親/其他" required
                     class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
          </div>
        </div>

        <!-- 註冊按鈕 -->
        <button type="submit" 
                class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-8 rounded-full transition-colors">
          註冊
        </button>
      </form>

      <!-- 登入連結 -->
      <p class="mt-6 text-blue-500">
        已有帳號？ <a href="login.html" class="hover:underline">立即去登入！</a>
      </p>
    </div>
</div>
{% endblock %}
