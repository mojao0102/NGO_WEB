{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="relative h-[120px] bg-cover bg-center" style="background-image: url('{% static "img/banner/news_banner.png" %}');"></div>

<section class="py-16 px-4 bg-gray-50 min-h-[calc(100vh-120px)] flex items-center">
    <div class="max-w-md mx-auto w-full bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
    <div class="text-center mb-6">
        <div class="w-20 h-20 rounded-full bg-orange-50 flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-key text-[3.5rem] text-orange-500"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-1">忘記密碼？</h2>
        <p class="text-gray-500 text-sm">請輸入您註冊時填寫的電子郵件，系統將為您發送密碼重設連結。</p>
    </div>

    {% include "partials/_alert.html" %}

    <form method="POST" action="{% url 'front_web:student_forget_password' %}" class="space-y-5" novalidate>
        {% csrf_token %}
        <div>
            <label for="email" class="block text-gray-700 text-sm font-medium mb-2">您的電子郵件地址</label>
            <div class="relative rounded-md shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <input type="email" id="email" name="email" class="block w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl text-gray-900 text-base focus:outline-none focus:ring-2 focus:ring-[#70c1d6]" placeholder="example@email.com" required>
            </div>
        </div>

        <div class="flex flex-col gap-3 pt-2">
            <button type="submit" class="w-full py-3.5 rounded-full bg-[#70c1d6] hover:bg-[#5db0c4] text-white text-lg font-medium text-center shadow-md transition-all">
                <i class="fa-solid fa-paper-plane mr-1"></i> 發送重設郵件
            </button>
            <a href="{% url 'front_web:student_login' %}" class="w-full py-3.5 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 text-lg font-medium text-center transition-all">
                返回登入頁面
            </a>
        </div>
    </form>
    </div>
</section>
{% endblock %}
