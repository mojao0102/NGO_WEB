{% extends "base.html" %} 
{% load static %}
{% block content %}

<div class="relative min-h-screen bg-cover bg-center flex items-center justify-center pt-[150px] pb-10" 
    style="background-image: url('{% static "img/bg/register.png" %}');">

    <div class="bg-white shadow-lg rounded-lg p-10 w-full max-w-lg mx-auto">
      {% include "partials/_alert.html" %}
      
      <div class="flex justify-between items-center mb-8">
          <h2 class="text-3xl font-bold text-gray-700">修改密碼</h2>
          <a href="{% url 'front_web:student_dashboard' %}" class="text-gray-500 hover:text-gray-700 transition-colors">
              <i class="fa-solid fa-arrow-left mr-1"></i>返回我的課程
          </a>
      </div>

      <form id="editPasswordForm" action="{% url 'front_web:student_change_password' %}" method="POST">
        {% csrf_token %}
        
        <div class="mb-6">
          <label for="old_password" class="block text-gray-700 font-medium mb-2">目前密碼</label>
          <input type="password" id="old_password" name="old_password" required
                class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <div class="mb-6">
          <label for="new_password" class="block text-gray-700 font-medium mb-2">新密碼</label>
          <input type="password" id="new_password" name="new_password" required
                class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <div class="mb-8">
          <label for="confirm_new_password" class="block text-gray-700 font-medium mb-2">確認新密碼</label>
          <input type="password" id="confirm_new_password" name="confirm_new_password" required
                class="w-full border border-gray-300 rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-400">
        </div>

        <div class="flex items-center justify-between">
          <button type="submit" name="btnChangePwd"
                  class="bg-[#001A77] hover:bg-blue-800 text-white font-bold py-3 px-8 rounded-full transition-colors">
            確認修改
          </button>
          
          <a href="{% url 'front_web:student_edit_info' %}" class="text-blue-500 hover:underline font-medium">
            修改個人資料
          </a>
        </div>
      </form>
    </div>
</div>
{% endblock %}
