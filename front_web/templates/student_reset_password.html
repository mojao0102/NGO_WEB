{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="relative h-[120px] bg-cover bg-center" style="background-image: url('{% static "img/banner/news_banner.png" %}');"></div>

<section class="py-16 px-4 bg-gray-50 min-h-[calc(100vh-120px)] flex items-center">
    <div class="max-w-md mx-auto w-full bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
    <div class="text-center mb-6">
        <div class="w-20 h-20 rounded-full bg-blue-50 flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-lock-open text-[3.5rem] text-blue-500"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900 mb-1">設定新密碼</h2>
        <p class="text-gray-500 text-sm">請為您的學生帳號設定一個全新的安全密碼。</p>
    </div>

    {% include "partials/_alert.html" %}

    <form method="POST" action="{% url 'front_web:student_reset_password' uidb64=uidb64 token=token %}" class="space-y-5" novalidate>
        {% csrf_token %}
        
        <div>
            <label for="password" class="block text-gray-700 text-sm font-medium mb-2">全新密碼</label>
            <div class="relative rounded-md shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <input type="password" id="password" name="password" class="block w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl text-gray-900 text-base focus:outline-none focus:ring-2 focus:ring-[#70c1d6]" placeholder="請輸入至少 6 位數密碼" required>
            </div>
        </div>

        <div>
            <label for="password_confirm" class="block text-gray-700 text-sm font-medium mb-2">再次確認新密碼</label>
            <div class="relative rounded-md shadow-sm">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <input type="password" id="confirm_password" name="confirm_password" class="block w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl text-gray-900 text-base focus:outline-none focus:ring-2 focus:ring-[#70c1d6]" placeholder="請再次輸入新密碼" required>
            </div>
        </div>

        <button type="submit" class="w-full py-3.5 rounded-full bg-[#6986f5] hover:bg-[#5673e3] text-white text-lg font-medium text-center shadow-md transition-all pt-2">
            <i class="fa-solid fa-square-check mr-1"></i> 儲存全新密碼
        </button>
    </form>
    </div>
</section>
{% endblock %}
