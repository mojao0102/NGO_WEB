{% extends 'staff_base.html' %}
{% block content %}

<main class="md:ml-[200px] flex-1 p-8 pt-16 md:pt-8">
    <h1 class="text-xl text-gray-700 font-medium mb-8">{% if template %}Edit{% else %}Create{% endif %} Course Template</h1>

    <form method="post" class="max-w-2xl space-y-5"
        action="{% if template %}{% url 'courses:course_template_edit' template.id %}{% else %}{% url 'courses:course_template_create' %}{% endif %}">
        {% csrf_token %}

        <div>
            <label class="block text-sm text-gray-600 mb-1">Category*</label>
            <select name="sub_category" required class="w-1/3 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
                <option value="">--select--</option>
                {% for cat in sub_categories %}
                <option value="{{ cat.id }}" {% if template.sub_category_id == cat.id %}selected{% endif %}>[{{ cat.main_category.short_name }}]{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Course name*</label>
            <input type="text" name="name" value="{{ template.name }}" required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Content</label>
            <textarea name="content" rows="5" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">{{ template.content }}</textarea>
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Teacher Name</label>
            <select name="teacher" class="w-1/3 border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
                <option value="">--select--</option>
                {% for t in teachers %}
                <option value="{{ t.id }}" {% if template.teacher_id == t.id %}selected{% endif %}>{{ t.first_name }} {{ t.last_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Feature</label>
            <div id="featureContainer">
                {% for f in features %}
                <input type="text" name="feature_{{ forloop.counter }}"
                    value="{{ f }}"
                    class="w-full border border-gray-300 rounded px-3 py-2 mb-2 focus:outline-none focus:ring focus:ring-blue-200 feature-row{% if forloop.counter > 4 %} hidden{% endif %}">
                {% endfor %}
            </div>
            <button type="button" onclick="addFeatureRow()" id="addFeatureBtn"
                class="mt-2 border border-gray-300 rounded px-4 py-2 text-gray-600 hover:bg-gray-50">
                <i class="fa-solid fa-plus mr-1"></i> 增添
            </button>
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Fee</label>
            <input type="number" step="0.01" name="course_fee" value="{{ template.course_fee }}"
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Total Lessons</label>
                <input type="number" step="1" name="total_lessons" id="totalLessons" value="{{ template.total_lessons }}"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Hours per lesson</label>
                <input type="number" step="0.5" name="hours_per_lesson" id="hoursPerLesson" value="{{ template.hours_per_lesson }}"
                    class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
            </div>
        </div>

        <div>
            <label class="block text-sm text-gray-600 mb-1">Total Hours</label>
            <input type="number" step="0.5" name="total_hours" id="totalHours" value="{{ template.total_hours }}"
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring focus:ring-blue-200">
        </div>
            <div>
            <label class="block text-sm text-gray-600 mb-1">*為必填項目 </label>
        </div>
        <div class="flex items-center gap-4 pt-4">
            <button type="submit" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">
                {% if template %}Confirm edit{% else %}Create{% endif %}
            </button>
            <a href="{% url 'courses:course_template_list' %}" class="bg-gray-700 text-white px-6 py-2 rounded hover:bg-gray-800">Back</a>
            {% if template %}
            <button type="submit" name="action" value="delete"
                onclick="return confirm('確定要刪除此課程範本？此操作不可還原。')"
                class="bg-red-500 text-white px-6 py-2 rounded hover:bg-red-600">Delete</button>
            {% endif %}
        </div>

    </form>
</main>

<script>
const MAX_FEATURE = 8;
function addFeatureRow() {
    const rows = document.querySelectorAll('.feature-row');
    for (const row of rows) {
        if (row.classList.contains('hidden')) {
            row.classList.remove('hidden');
            return;
        }
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const totalLessons = document.getElementById('totalLessons');
    const hoursPerLesson = document.getElementById('hoursPerLesson');
    const totalHours = document.getElementById('totalHours');

    function calcTotalHours() {
        const l = parseFloat(totalLessons.value) || 0;
        const h = parseFloat(hoursPerLesson.value) || 0;
        totalHours.value = (l * h) || '';
    }

    totalLessons.addEventListener('input', calcTotalHours);
    hoursPerLesson.addEventListener('input', calcTotalHours);
});
</script>
{% endblock %}
