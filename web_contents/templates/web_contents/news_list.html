{% extends 'staff_base.html' %}

{% block content %}
<main class="md:ml-[200px] flex-1 p-8 pt-16 md:pt-8">
    <h1 class="text-2xl text-gray-600 font-medium mb-8">News</h1>

    <div class="flex flex-wrap items-center gap-3 mb-8">
        <div class="relative flex-grow max-w-[460px]">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" class="w-full pl-10 pr-4 py-2.5 rounded-full border border-gray-300 focus:outline-none">
        </div>

        <div class="relative dropdown-filter">
            <button class="border border-gray-300 py-2.5 px-4 rounded hover:bg-gray-50 flex items-center gap-2">
                <i class="fa-solid fa-filter"></i> Filter
            </button>
            <div class="hidden absolute top-full left-0 mt-1 bg-white border border-gray-300 dropdown-card min-w-[200px]">
                <div class="py-2.5 px-3 hover:bg-gray-100 cursor-pointer">filter 1</div>
                <div class="py-2.5 px-3 hover:bg-gray-100 cursor-pointer">filter 2</div>
            </div>
        </div>

        <button class="border border-gray-300 py-2.5 px-4 rounded hover:bg-gray-50">Search</button>
        <button class="border border-gray-300 py-2.5 px-4 rounded hover:bg-gray-50"><i class="fa-solid fa-arrows-rotate"></i></button>

        <div class="relative dropdown-action">
            <button class="border border-gray-300 py-2.5 px-4 rounded hover:bg-gray-50">Action</button>
            <div class="hidden absolute top-full mt-1 bg-white border border-gray-300 dropdown-card min-w-[200px]">
                <div class="py-2 px-5 hover:bg-gray-100 cursor-pointer">Set Publish</div>
                <div class="py-2 px-5 hover:bg-gray-100 cursor-pointer">Undo Publish</div>
                <div class="py-2 px-5 hover:bg-gray-100 cursor-pointer">Set Hot Course</div>
                <div class="py-2 px-5 hover:bg-gray-100 cursor-pointer">Undo Hot Course</div>
            </div>
        </div>

        <button class="border border-gray-300 py-2.5 px-4 rounded hover:bg-gray-50 flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> Create
        </button>
    </div>

    <!-- 手機只顯示 Title + edit -->
    <div class="overflow-x-auto">
        <table class="table-fixed w-full border-collapse">
            <thead>
                <tr class="border-b border-gray-300">
                    <!-- Title 手機保留 -->
                    <th class="w-[82%] md:w-[42%] py-4 text-left text-gray-600 font-medium">Title</th>
                    <!-- Published 桌面隱藏手機隱藏 -->
                    <th class="hidden md:table-cell w-[14%] py-4 text-left text-gray-600 font-medium">Published</th>
                    <!-- created date 桌面隱藏手機隱藏 -->
                    <th class="hidden md:table-cell w-[22%] py-4 text-left text-gray-600 font-medium">created date</th>
                    <!-- created by 桌面隱藏手機隱藏 -->
                    <th class="hidden md:table-cell w-[14%] py-4 text-left text-gray-600 font-medium">created by</th>
                    <!-- edit 永遠保留 -->
                    <th class="w-[18%] md:w-[8%] py-4 text-left text-gray-600 font-medium">edit</th>
                </tr>
            </thead>
            <tbody>
                <tr class="border-b border-gray-200 table-row text-sm">
                    <td class="py-5 align-top">XXXXXXXXXXXXXXXXXX ...</td>
                    <td class="hidden md:table-cell py-5 align-top">Yes</td>
                    <td class="hidden md:table-cell py-5 align-top">2026-01-01 14:00:000</td>
                    <td class="hidden md:table-cell py-5 align-top">Staff</td>
                    <td class="py-5">
                        <button class="text-[#527bff] text-xl hover:opacity-80">
                            <div class="px-3">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </div>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 全域 More 選單 -->
    <div id="globalMoreMenu" class="hidden fixed z-[999999] bg-white border border-gray-300 shadow-lg min-w-[130px]">
        <div class="py-2.5 px-3 hover:bg-gray-100 cursor-pointer flex items-center gap-3">
            <i class="fa-solid fa-eye text-[#737373]"></i> View
        </div>
        <div class="py-2.5 px-3 hover:bg-gray-100 cursor-pointer flex items-center gap-3">
            <i class="fa-solid fa-pen-to-square text-[#527bff]"></i> Edit
        </div>
    </div>
</main>
{% endblock %}
